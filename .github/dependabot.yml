version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    reviewers:
      - "arselenezammouri-lang"
    groups:
      production:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@supabase/*"
          - "stripe"
          - "openai"
      dev:
        dependency-type: "development"
        patterns:
          - "*"
